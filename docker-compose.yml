services:
  mariadb:
    image: mariadb:latest
    restart: always
    container_name: school_db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: school_inventory
      MARIADB_USER: student
      MARIADB_PASSWORD: student
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: school_backend
    ports:
      - "8081:8081"
    depends_on:
      - mariadb
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/school_inventory
      SPRING_DATASOURCE_USERNAME: student
      SPRING_DATASOURCE_PASSWORD: student

  frontend:
    build: ./frontend
    container_name: school_frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    depends_on:
      - backend
