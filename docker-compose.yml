version: '3.9'

services:
  mariadb:
    image: mariadb:11.3
    container_name: student-portal-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: student_portal
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: student-portal-backend
    restart: always
    depends_on:
      - mariadb
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/student_portal
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8081:8081"

  frontend:
    build: ./frontend
    container_name: student-portal-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mariadb_data: