spring.application.name=school-inventory

# 1. Připojení k databázi (údaje z Dockeru)
server.port=8081
spring.datasource.url=jdbc:mariadb://localhost:3306/school_inventory
spring.datasource.username=student
spring.datasource.password=password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# 2. Nastavení Hibernate (JPA)
# 'update' znamená: zkontroluj tabulky a kdyžtak je uprav podle Javy (bezpečné pro vývoj)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false
spring.jpa.open-in-view=false
